# Better colors
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"

# Enable extended key sequences so modified Enter/arrow keys work in TUIs like pi
set -g extended-keys on
set -g extended-keys-format csi-u

# 0 is too far from ` ;)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using \ and -
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# open new windows in the current pane's directory
bind c new-window -c "#{pane_current_path}"

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf \; display "Config reloaded!"


# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# ===== Scroll and History =====
set -g history-limit 50000
set -g display-time 4000

# Faster command sequences (no delay for escape)
set -s escape-time 0

# ===== Vi mode and Copy/Paste =====
set-window-option -g mode-keys vi

# Copy mode styling - pink highlight for selection
set -g mode-style "fg=#1e1e2e,bg=#f38ba8"

# Change pane border to pink when in copy mode
set-hook -g pane-mode-changed 'if -F "#{pane_in_mode}" "set pane-active-border-style fg=#f38ba8" "set pane-active-border-style fg=#89b4fa"'

# Enter copy mode with prefix + [
# v to start selection, y to yank, q to quit
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Mouse selection copies to clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Double click to select word
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word

# Scroll up/down with mouse wheel
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down

# Window navigation with prefix
bind p previous-window
bind n next-window

# Paste from clipboard
bind v paste-buffer
bind V choose-buffer  # Choose which buffer to paste from

# ===== Session Management =====
# Easy session switching
bind s choose-tree -sZ  # Session picker with preview

# Create new session
bind S command-prompt -p "New session name:" "new-session -s '%%' -c '#{pane_current_path}'"

# Kill session
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# Switch to last session
bind L switch-client -l

# ===== Popup Windows =====
# Lazygit popup (80% of screen)
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "lazygit"

# Quick scratchpad/notes
bind o display-popup -E -w 60% -h 60% "nvim ~/notes/scratch.md"

# Htop popup
bind H display-popup -E -w 80% -h 80% "htop"

# K9s popup (if in k8s context)
bind K display-popup -E -w 90% -h 90% "k9s"

# ===== Pane Navigation =====
# Resize panes with prefix + h/j/k/l (repeatable)
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# ===== Plugins =====
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session management
set -g @plugin '27medkamal/tmux-session-wizard'
set -g @session-wizard 't'

# Session persistence - saves/restores sessions across restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Better copy mode
set -g @plugin 'tmux-plugins/tmux-copycat'  # Regex search in copy mode

# Theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'

# Catppuccin window status (v2.x option names)
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

# Status separators
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"


# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Agent-friendly status bar: stable, contextual, low-noise
set -g status-interval 5
set -g status-left-length 80
set -g status-right-length 120

set -g status-left "#[fg=#89b4fa,bold]#S #[fg=#6c7086]#I:#P #[fg=#a6e3a1]#{pane_current_command} "
set -g status-right "#{?client_prefix,#[fg=#1e1e2e,bg=#f38ba8,bold] PREFIX #[default] ,}#{?pane_in_mode,#[fg=#1e1e2e,bg=#f9e2af,bold] COPY #[default] ,}#[fg=#cdd6f4]#{b:pane_current_path} #[fg=#f38ba8]#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null)"

# Window navigation (after TPM to avoid plugin overrides)
bind -n M-H previous-window
bind -n M-L next-window
bind -n C-p previous-window
bind -n C-n next-window

# Cheatsheet popup (after TPM)
bind / display-popup -E -w 80% -h 80% "/opt/homebrew/bin/glow -p ~/.dotfiles/cheatsheet.md"

# Ctrl-u: pass through to Neovim, otherwise enter copy mode and scroll up
bind -n C-u if-shell -F '#{==:#{pane_current_command},nvim}' 'send-keys C-u' 'copy-mode; send-keys -X halfpage-up'
unbind -n C-d

# Stay in copy mode on mouse selection (must be after TPM to override plugins)
# Unbind the auto-cancel behavior so we stay in copy mode after selecting
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# ===== Claude Code Annotations =====
# A — annotate selection; copy-pipe (not cancel) keeps copy mode active at same position
bind-key -T copy-mode-vi 'A' send-keys -X copy-pipe "~/.tmux/scripts/annotate.sh"
# prefix+R — compile all session annotations and paste as review into active prompt
bind-key R run-shell "~/.tmux/scripts/review.sh"

