# Yazi keymap configuration
# https://yazi-rs.github.io/docs/configuration/keymap

[[manager.prepend_keymap]]
on = ["g", "h"]
run = "cd ~"
desc = "Go to home"

[[manager.prepend_keymap]]
on = ["g", "c"]
run = "cd ~/.config"
desc = "Go to config"

[[manager.prepend_keymap]]
on = ["g", "d"]
run = "cd ~/Downloads"
desc = "Go to downloads"

[[manager.prepend_keymap]]
on = ["g", "w"]
run = "cd ~/work"
desc = "Go to work"

[[manager.prepend_keymap]]
on = ["g", "D"]
run = "cd ~/.dotfiles"
desc = "Go to dotfiles"

# Open in nvim
[[manager.prepend_keymap]]
on = ["e"]
run = "open --interactive"
desc = "Open interactively"

# Lazygit integration
[[manager.prepend_keymap]]
on = ["g", "g"]
run = "shell 'lazygit' --block --confirm"
desc = "Open lazygit"

# Toggle hidden files
[[manager.prepend_keymap]]
on = ["."]
run = "hidden toggle"
desc = "Toggle hidden files"
