# Yazi keymap configuration
# https://yazi-rs.github.io/docs/configuration/keymap

# Navigation shortcuts
[[mgr.prepend_keymap]]
on = ["g", "h"]
run = "cd ~"
desc = "Go to home"

[[mgr.prepend_keymap]]
on = ["g", "c"]
run = "cd ~/.config"
desc = "Go to config"

[[mgr.prepend_keymap]]
on = ["g", "d"]
run = "cd ~/Downloads"
desc = "Go to downloads"

[[mgr.prepend_keymap]]
on = ["g", "w"]
run = "cd ~/work"
desc = "Go to work"

[[mgr.prepend_keymap]]
on = ["g", "D"]
run = "cd ~/.dotfiles"
desc = "Go to dotfiles"

[[mgr.prepend_keymap]]
on = ["g", "r"]
run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
desc = "Go to Git root"

# Smarter defaults
[[mgr.prepend_keymap]]
on = "l"
run = "plugin smart-enter"
desc = "Enter directory or open file"

[[mgr.prepend_keymap]]
on = "p"
run = "plugin smart-paste"
desc = "Paste into hovered directory or CWD"

[[mgr.prepend_keymap]]
on = "f"
run = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on = "F"
run = "plugin jump-to-char"
desc = "Jump to char"

# Open/actions
[[mgr.prepend_keymap]]
on = "e"
run = "open"
desc = "Open"

[[mgr.prepend_keymap]]
on = "O"
run = "open --interactive"
desc = "Open interactively"

[[mgr.prepend_keymap]]
on = "!"
for = "unix"
run = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on = "<C-p>"
for = "macos"
run = "shell -- qlmanage -p %s"
desc = "Preview with Quick Look"

# Panes
[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane min-preview"
desc = "Show/hide preview pane"

[[mgr.prepend_keymap]]
on = "P"
run = "plugin toggle-pane max-preview"
desc = "Maximize/restore preview pane"

[[mgr.prepend_keymap]]
on = ["<C-r>"]
run = "plugin toggle-pane reset"
desc = "Reset pane layout"

# Git/dev tools
[[mgr.prepend_keymap]]
on = ["g", "g"]
run = "shell 'lazygit' --block --confirm"
desc = "Open lazygit"

[[mgr.prepend_keymap]]
on = ["g", "f"]
run = "plugin vcs-files"
desc = "Show Git changed files"

[[mgr.prepend_keymap]]
on = ["c", "m"]
run = "plugin chmod"
desc = "Change mode"

[[mgr.prepend_keymap]]
on = ["d", "d"]
run = "plugin diff"
desc = "Diff selected files"

# Visibility
[[mgr.prepend_keymap]]
on = "."
run = "hidden toggle"
desc = "Toggle hidden files"

# Input UX: one Esc closes input instead of entering Vi mode
[[input.prepend_keymap]]
on = "<Esc>"
run = "close"
desc = "Cancel input"
